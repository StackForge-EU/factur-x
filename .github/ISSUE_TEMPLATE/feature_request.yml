name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description of the Feature
      description: A clear and concise description of the feature you'd like.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Use Case / Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: Describe your use case...
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API or Approach
      description: How would you like this feature to work? (optional)
      placeholder: Describe the API or approach...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered. (optional)
      placeholder: Describe alternatives...
    validations:
      required: false
